<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#000;color:#fff;font-family:'Inter Tight',system-ui,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  #root{position:fixed;inset:0}
  .gold{color:#d4af37}
  .gold-lt{color:#f3d066}
  .mono{font-family:'JetBrains Mono',monospace;letter-spacing:.28em;text-transform:uppercase;font-weight:500}
  .serif{font-family:'Instrument Serif',serif}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  @keyframes gshimmer{
    0%{background-position:-200% 0}
    100%{background-position:200% 0}
  }
  @keyframes glow{0%,100%{filter:drop-shadow(0 0 20px rgba(212,175,55,.35))}50%{filter:drop-shadow(0 0 50px rgba(212,175,55,.7))}}
  @keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
  @keyframes drift{0%{transform:translateX(-3%)}100%{transform:translateX(3%)}}
  @keyframes pulse-ring{0%{transform:scale(.9);opacity:.8}100%{transform:scale(2.4);opacity:0}}
  @keyframes particleRise{
    0%  {transform:translateY(0)        scale(.6); opacity:0}
    10% {opacity:.85}
    50% {transform:translateY(-540px)   scale(1)}
    90% {opacity:.55}
    100%{transform:translateY(-1080px)  scale(.7); opacity:0}
  }
  @keyframes haloPulse{
    0%,100%{opacity:.18; transform:translateX(-50%) scale(1)}
    50%    {opacity:.34; transform:translateX(-50%) scale(1.08)}
  }
  @keyframes orbitConic{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .shimmer{background:linear-gradient(90deg,#d4af37 0%,#f3d066 25%,#fff9d6 50%,#f3d066 75%,#d4af37 100%);background-size:200% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:gshimmer 6s linear infinite}
  .scroll-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.32em;color:rgba(212,175,55,.6);text-transform:uppercase;pointer-events:none;opacity:.8}
</style>

<script type="text/babel" data-presets="env,react">
const { useEffect, useLayoutEffect, useMemo, useRef, useState, useContext, createContext } = React;

/* ============================================================
   1COAST MEDIA · THE VISUAL SALES MODULE · MOBILE PORTRAIT
   8 scenes · 48s · 1080x1920 (auto-scales to viewport)
   Loaded by the homepage when viewport <= 600px wide.
   Same timeline as desktop; scenes redesigned for vertical layout.
   ============================================================ */

const LOGO_SRC = (document.getElementById('logo-src-holder').textContent || '').trim();

// Brand palette
const BG       = '#000';
const PANEL    = '#0c0c0c';
const INK      = '#f5f1e6';
const INK_DIM  = 'rgba(245,241,230,.55)';
const GOLD     = '#d4af37';
const GOLD_LT  = '#f3d066';
const GOLD_DK  = '#8a6c1d';
const LINE     = 'rgba(212,175,55,.16)';
const LINE_HOT = 'rgba(212,175,55,.42)';
const RED      = '#ff4a3a';

// Easing
const Easing = {
  linear:   t => t,
  easeInQuad:   t => t*t,
  easeOutQuad:  t => t*(2-t),
  easeInOutQuad:t => t<.5 ? 2*t*t : -1+(4-2*t)*t,
  easeOutCubic: t => 1-Math.pow(1-t,3),
  easeOutQuart: t => 1-Math.pow(1-t,4),
  easeOutExpo:  t => t===1 ? 1 : 1-Math.pow(2,-10*t),
  easeInOutCubic:t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2,
  easeOutBack:  t => { const c1=1.70158, c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); },
  easeOutElastic:t => {
    const c4=(2*Math.PI)/3;
    return t===0?0:t===1?1: Math.pow(2,-10*t)*Math.sin((t*10-.75)*c4)+1;
  }
};
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const lerp  = (a,b,t) => a+(b-a)*t;

/* ============ Timeline & Stage ============ */
const TLCtx = createContext(null);
const useTimeline = () => useContext(TLCtx);

const SpriteCtx = createContext({ start:0, end:0 });
function Sprite({ start, end, children }){
  const tl = useTimeline();
  if(!tl) return null;
  const active = tl.time >= start && tl.time <= end;
  if(!active && !tl.debug) return null;
  const localTime = tl.time - start;
  const duration  = end - start;
  return (
    <SpriteCtx.Provider value={{ start, end }}>
      {typeof children === 'function' ? children({ localTime, duration, time: tl.time }) : children}
    </SpriteCtx.Provider>
  );
}

function Stage({ width=1080, height=1920, duration=48, background=BG, persistKey, children }){
  const fitRef = useRef(null);
  const [scale, setScale] = useState(1);
  // SCROLL MODE: when the parent loads this iframe with `?scroll=1`, time is
  // driven by parent scroll position via postMessage. Auto-play is disabled.
  // Standalone the module still auto-plays from 0.
  const isScrollMode = (typeof window !== 'undefined') &&
    new URLSearchParams(window.location.search).has('scroll');
  const [playing, setPlaying] = useState(!isScrollMode);
  const [time, setTime] = useState(0);
  const rafRef = useRef(0);
  const lastRef = useRef(0);

  // Auto scale — observe the outer fixed container so we always size to the viewport
  useLayoutEffect(() => {
    const el = fitRef.current;
    if(!el) return;
    const fit = () => {
      const w = el.clientWidth;
      const h = el.clientHeight;
      if(!w || !h) return;
      const s = Math.min(w/width, h/height);
      setScale(s);
    };
    const ro = new ResizeObserver(fit); ro.observe(el);
    window.addEventListener('resize', fit);
    fit();
    return () => { ro.disconnect(); window.removeEventListener('resize', fit); };
  }, [width, height]);

  // RAF — advance time, but STOP at the end instead of looping (replay button takes over)
  useEffect(() => {
    const tick = (ts) => {
      if(!lastRef.current) lastRef.current = ts;
      const dt = (ts - lastRef.current)/1000;
      lastRef.current = ts;
      if(playing){
        setTime(t => {
          let nt = t + dt;
          if(nt >= duration) nt = duration; // clamp to end (no loop)
          return nt;
        });
      }
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [playing, duration]);

  // Pause automatically the moment we hit the end of the timeline (auto-play mode only)
  useEffect(() => {
    if(isScrollMode) return;
    if(playing && time >= duration - 0.001) setPlaying(false);
  }, [time, duration, playing, isScrollMode]);

  // SCROLL MODE: listen for postMessage from parent and scrub the timeline.
  // Parent sends { type: 'vsm:scrub', progress: 0..1 } on every scroll frame.
  useEffect(() => {
    if(!isScrollMode) return;
    const onMsg = (e) => {
      const d = e.data;
      if(!d || d.type !== 'vsm:scrub') return;
      const p = Math.max(0, Math.min(1, Number(d.progress) || 0));
      setTime(p * duration);
    };
    window.addEventListener('message', onMsg);
    // Tell the parent we're ready so it can send the initial progress
    try { window.parent.postMessage({ type: 'vsm:ready' }, '*'); } catch(_) {}
    return () => window.removeEventListener('message', onMsg);
  }, [duration, isScrollMode]);

  // Keyboard shortcuts (invisible power-user controls; UI bar is hidden)
  useEffect(() => {
    const h = (e) => {
      if(e.code==='Space'){ e.preventDefault(); setPlaying(p => !p); }
      if(e.code==='KeyR'){ setTime(0); setPlaying(true); }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [duration]);

  const tlValue = useMemo(() => ({ time, duration, playing, setTime, setPlaying, debug:false }), [time, duration, playing]);

  // In scroll mode, the "end" is just "you scrolled to the bottom" — no Replay button; scroll back up to replay.
  const ended = !isScrollMode && !playing && time >= duration - 0.05;
  const replay = () => { setTime(0); setPlaying(true); };

  return (
    <TLCtx.Provider value={tlValue}>
      <div ref={fitRef} style={{position:'fixed',inset:0,background:'#000',overflow:'hidden'}}>
        {/* Wrapper matches scaled visual size and is absolutely centered. Inner stage scales from top-left so nothing drifts. */}
        <div style={{
          position:'absolute',
          top:'50%', left:'50%',
          width: width*scale, height: height*scale,
          transform:'translate(-50%,-50%)'
        }}>
          <div style={{
            width, height,
            transform:`scale(${scale})`,
            transformOrigin:'top left',
            position:'absolute', top:0, left:0,
            background,
            overflow:'hidden',
            boxShadow:'0 0 0 1px rgba(212,175,55,.06), 0 30px 120px rgba(0,0,0,.9)'
          }}>
            {children}
          </div>
        </div>
        {/* Replay overlay — appears at the bottom of the iframe once the video has finished */}
        {ended && (
          <button
            onClick={replay}
            aria-label="Replay video"
            style={{
              position:'fixed', left:'50%', bottom:30,
              transform:'translateX(-50%)',
              display:'inline-flex', alignItems:'center', gap:10,
              padding:'12px 22px',
              background:'rgba(10,10,10,.85)',
              color:GOLD_LT,
              border:`1px solid ${GOLD}`,
              fontFamily:'JetBrains Mono,monospace',
              fontSize:11, fontWeight:600,
              letterSpacing:'.32em', textTransform:'uppercase',
              cursor:'pointer',
              backdropFilter:'blur(10px)',
              boxShadow:'0 12px 40px rgba(0,0,0,.6), 0 0 24px rgba(212,175,55,.25)',
              zIndex:1001,
              animation:'glow 2.4s ease-in-out infinite'
            }}
          >
            <span style={{fontSize:14}}>⟲</span>
            <span>Replay</span>
          </button>
        )}
      </div>
    </TLCtx.Provider>
  );
}

function Playbar(){
  const tl = useTimeline();
  if(!tl) return null;
  const pct = (tl.time / tl.duration) * 100;
  return (
    <div style={{
      position:'fixed', bottom:18, left:'50%', transform:'translateX(-50%)',
      display:'flex', alignItems:'center', gap:18,
      padding:'12px 22px',
      background:'rgba(10,10,10,.78)',
      border:'1px solid rgba(212,175,55,.22)',
      backdropFilter:'blur(12px)',
      fontFamily:'JetBrains Mono,monospace', fontSize:11, color:INK, letterSpacing:'.22em', textTransform:'uppercase',
      zIndex:1000
    }}>
      <button onClick={() => tl.setPlaying(!tl.playing)} style={btn}>

/* =================================================
   SCENE 02 · THE PROBLEM  (4.2 – 11.2s)
   Tangled vendor stack → "One partner"
   Slowed by ~2s so the "Seven vendors" headline reads,
   the chaos sits, and the "One partner" stamp lingers.
   ================================================= */
function S02_Problem(){
  // Portrait layout: vendor cards in a clean 2-column grid (3 rows + 1 last centered).
  const vendors = [
    {t:'Videographer',  n:'$3,000/mo',     col:0, row:0},
    {t:'Photographer',  n:'$800/mo',       col:1, row:0},
    {t:'Social Manager',n:'$1,200/mo',     col:0, row:1},
    {t:'Web Developer', n:'$4,000 upfront',col:1, row:1},
    {t:'SEO Agency',    n:'$1,500/mo',     col:0, row:2},
    {t:'Ad Buyer',      n:'15% of spend',  col:1, row:2},
    {t:'Email / CRM',   n:'$400/mo',       col:0.5, row:3}, // centered last row
  ];
  // Grid bounds (in stage coordinates 1080×1920)
  const gridLeft = 80, gridRight = 80;
  const gridTopY = 580, rowH = 240;
  const colW = (1080 - gridLeft - gridRight) / 2;
  return (
    <Sprite start={4.2} end={11.2}>{({localTime,duration})=>{
      const op = clamp(localTime/0.3,0,1) * clamp((duration-localTime)/0.5,0,1);
      const titleT = clamp(localTime/0.6,0,1);
      const collapseT = clamp((localTime-3.9)/0.8,0,1);
      const stampT = clamp((localTime-4.7)/0.5,0,1);
      const sweepT = clamp((localTime-4.4)/0.5,0,1);
      return (
        <div style={{position:'absolute',inset:0,background:BG}}>
          <Chrome num="2" total="8" chapter="The Problem"/>
          {/* Halo glow behind headline */}
          <div aria-hidden="true" style={{
            position:'absolute', top:120, left:'50%',
            width:980, height:480,
            transform:'translateX(-50%)',
            background:`radial-gradient(ellipse at center, rgba(212,175,55,.22) 0%, rgba(212,175,55,.08) 40%, transparent 70%)`,
            filter:'blur(40px)',
            opacity:op*titleT*0.9,
            animation:'haloPulse 4.5s ease-in-out infinite',
            pointerEvents:'none', zIndex:1
          }}/>
          <div style={{position:'absolute',top:200,left:60,right:60,opacity:op*titleT,transform:`translateY(${(1-titleT)*12}px)`,zIndex:2}}>
            <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:22,letterSpacing:'.32em',color:GOLD,textTransform:'uppercase',marginBottom:18,lineHeight:1.4}}>Right now, you're running the scattered stack.</div>
            <div style={{fontFamily:'Oswald,sans-serif',fontWeight:700,fontSize:108,lineHeight:.95,color:INK,textTransform:'uppercase',letterSpacing:'-.018em'}}>
              Seven <span className="gold">vendors.</span><br/>Seven invoices.<br/><span style={{color:INK_DIM}}>Zero</span> <span className="gold">system.</span>
            </div>
          </div>
          {/* Vendor cards grid */}
          <div style={{position:'absolute',top:gridTopY,left:gridLeft,right:gridRight,bottom:160,zIndex:2}}>
            {vendors.map((v,i) => {
              const appear = clamp((localTime-0.6-i*0.18)/0.5,0,1);
              const e = Easing.easeOutBack(appear);
              const collapsed = collapseT;
              const baseLeft = v.col * colW + colW/2;
              const baseTop  = v.row * rowH + rowH/2;
              const centerLeft = (1080 - gridLeft - gridRight)/2;
              const centerTop  = 3*rowH/2;
              const tx = lerp(baseLeft, centerLeft, Math.pow(collapsed,2));
              const ty = lerp(baseTop,  centerTop,  Math.pow(collapsed,2));
              const sc = lerp(1, 0.18, collapsed) * e;
              const fade = 1 - Math.pow(collapsed,1.5);
              return (
                <div key={i} style={{
                  position:'absolute', left:tx, top:ty,
                  transform:`translate(-50%,-50%) scale(${sc})`,
                  opacity:appear*op*fade,
                  transition:'none'
                }}>
                  <div style={{
                    background:PANEL,
                    border:`1px solid rgba(255,74,58,${0.35 + 0.2*Math.sin(i)})`,
                    padding:'22px 28px',
                    minWidth:380,
                    boxShadow:'0 18px 44px rgba(0,0,0,.7)'
                  }}>
                    <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:16,letterSpacing:'.26em',color:'#ff8573',textTransform:'uppercase',marginBottom:10,fontWeight:500}}>{v.t}</div>
                    <div style={{fontFamily:'Oswald,sans-serif',fontWeight:600,fontSize:36,color:INK,textTransform:'uppercase',letterSpacing:'-.005em'}}>{v.n}</div>
                  </div>
                </div>
              );
            })}
          </div>
          {/* Sweep line */}
          {sweepT > 0 && sweepT < 1 && (
            <div style={{position:'absolute',left:0,right:0,top:0,bottom:0,pointerEvents:'none',overflow:'hidden'}}>
              <div style={{position:'absolute',left:0,right:0,top:`${sweepT*100}%`,height:140,background:`linear-gradient(180deg,transparent,rgba(212,175,55,.35),transparent)`,filter:'blur(14px)'}}/>
            </div>
          )}
          {/* Gold stamp */}
          <div style={{position:'absolute',top:'58%',left:'50%',transform:`translate(-50%,-50%) scale(${lerp(0.5,1,Easing.easeOutBack(stampT))}) rotate(${lerp(-6,-2,stampT)}deg)`,opacity:stampT*op,zIndex:5}}>
            <div style={{
              border:`4px solid ${GOLD}`,
              padding:'40px 64px',
              background:'rgba(212,175,55,.04)',
              boxShadow:`0 0 100px rgba(212,175,55,.4)`
            }}>
              <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:18,letterSpacing:'.36em',color:GOLD,textTransform:'uppercase',textAlign:'center',marginBottom:14,fontWeight:500}}>Replace them all with</div>
              <div style={{fontFamily:'Oswald,sans-serif',fontWeight:700,fontSize:104,lineHeight:.94,textTransform:'uppercase',letterSpacing:'-.02em',textAlign:'center'}} className="gold">
                One<br/>partner.
              </div>
            </div>
          </div>
        </div>
      );
    }}</Sprite>
  );
}

/* ============ Scene Transitions =============================
   Same explosive pulse as the desktop module — flash, gold edge,
   sweeping bar, expanding rings, scanline glitch — tuned for the
   1080x1920 portrait canvas. Fires within ±0.45s of every scene
   boundary so each cut feels like an impact instead of a fade. */
const SCENE_BOUNDARIES = [4.2, 11.2, 15.4, 23.4, 30.4, 35.4, 42.4];
const TRANSITION_HALF  = 0.45;
function SceneTransitions(){
  const tl = useTimeline();
  if(!tl) return null;
  let nearest = SCENE_BOUNDARIES[0];
  let dist = Math.abs(tl.time - nearest);
  for(let i=1;i<SCENE_BOUNDARIES.length;i++){
    const d = Math.abs(tl.time - SCENE_BOUNDARIES[i]);
    if(d < dist){ dist = d; nearest = SCENE_BOUNDARIES[i]; }
  }
  if(dist > TRANSITION_HALF) return null;
  const u = dist / TRANSITION_HALF;
  const k = (1 - u) * (1 - u);
  const dir = tl.time < nearest ? -1 : 1;
  const after = Math.max(0, tl.time - nearest);
  const ringP = Math.min(1, after / TRANSITION_HALF);
  return (
    <div style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:60,overflow:'hidden'}}>
      {/* White radial flash */}
      <div style={{
        position:'absolute',inset:0,
        background:`radial-gradient(circle at 50% 50%, rgba(255,255,255,${k*0.55}), rgba(255,255,255,${k*0.10}) 38%, transparent 72%)`,
        mixBlendMode:'screen'
      }}/>
      {/* Gold edge glow */}
      <div style={{
        position:'absolute',inset:0,
        boxShadow:`inset 0 0 ${180*k}px ${42*k}px rgba(212,175,55,${k*0.65})`,
      }}/>
      {/* Horizontal sweeping bar (top-down for portrait feel) */}
      <div style={{
        position:'absolute',left:0,right:0,
        height:'10%',
        top: dir > 0 ? `${(1-k)*100 - 5}%` : `${k*100 - 5}%`,
        background:`linear-gradient(180deg, transparent, rgba(212,175,55,${k*0.85}), rgba(255,255,255,${k}), rgba(212,175,55,${k*0.85}), transparent)`,
        opacity: k,
        transform:`skewY(${(dir>0?-8:8)*k}deg)`,
        filter:`blur(${5*k}px)`
      }}/>
      {/* Expanding rings sized for 1080x1920 portrait stage */}
      {[0, 0.18, 0.36].map((delay, idx) => {
        const t = Math.max(0, ringP - delay);
        if(t <= 0) return null;
        const size = 220 + t * 2200;
        const op   = (1 - t) * 0.45;
        return (
          <div key={idx} style={{
            position:'absolute', top:'50%', left:'50%',
            width:size, height:size,
            transform:'translate(-50%,-50%)',
            border:`3px solid rgba(212,175,55,${op})`,
            borderRadius:'50%',
            boxShadow:`0 0 28px rgba(212,175,55,${op*0.55})`
          }}/>
        );
      })}
      {/* Scanline glitch */}
      <div style={{
        position:'absolute',inset:0,
        background:`repeating-linear-gradient(0deg, transparent 0, transparent 4px, rgba(255,255,255,${k*0.07}) 4px, rgba(255,255,255,${k*0.07}) 5px)`,
        opacity:k,
        mixBlendMode:'overlay'
      }}/>
    </div>
  );
}

function App(){

  );
}
